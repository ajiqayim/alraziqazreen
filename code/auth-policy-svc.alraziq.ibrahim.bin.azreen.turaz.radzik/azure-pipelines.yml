# Gradle
# Build your Java project and run tests with Gradle using a Gradle wrapper script.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
  - dev
  - master
  - test
  - qa

pool:
  vmImage: ubuntu-latest

steps:
  - task: Gradle@2
    inputs:
      workingDirectory: ''
      gradleWrapperFile: 'gradlew'
      gradleOptions: '-Xmx3072m'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.8'
      jdkArchitectureOption: 'x64'
      publishJUnitResults: false
      testResultsFiles: '**/TEST-*.xml'
      tasks: 'build'
  - task: CopyFiles@2
    displayName: 'CopyFiles Dist folder generated by the build'
    inputs:
      targetFolder: $(Build.ArtifactStagingDirectory)/build
      sourceFolder: $(Build.SourcesDirectory)/build
  - task: CopyFiles@2
    displayName: 'CopyFiles Src folder'
    inputs:
      targetFolder: $(Build.ArtifactStagingDirectory)/src
      sourceFolder: $(Build.SourcesDirectory)/src
  - task: CopyFiles@2
    displayName: 'CopyFiles Config folder'
    inputs:
      targetFolder: $(Build.ArtifactStagingDirectory)/config
      sourceFolder: $(Build.SourcesDirectory)/config
  - task: CopyFiles@2
    displayName: 'CopyFiles Docker and Config for release'
    inputs:
      targetFolder: $(Build.ArtifactStagingDirectory)
      sourceFolder: $(Build.SourcesDirectory)
      Contents: '*'
  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: $(Build.ArtifactStagingDirectory)
      ArtifactName: auth-policy-svc
      publishLocation: Container
